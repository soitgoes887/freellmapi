name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod
      image_tag:
        description: 'Docker image tag (optional - uses existing if not provided)'
        required: false

env:
  DOCKER_IMAGE: anicu/freellmapi

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate version tag
        id: version
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            echo "tag=${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            DATE=$(date +'%Y.%m.%d')
            SHORT_SHA=$(git rev-parse --short HEAD)
            echo "tag=${DATE}-${SHORT_SHA}-${{ github.run_number }}" >> $GITHUB_OUTPUT
          fi

      - name: Set environment variables
        id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="${{ github.event.inputs.environment }}"
          else
            ENV="dev"
          fi
          echo "environment=${ENV}" >> $GITHUB_OUTPUT

          if [ "$ENV" = "prod" ]; then
            echo "stack=soitgoes887/freellmapi-prod" >> $GITHUB_OUTPUT
            echo "namespace=freellmapi-prod" >> $GITHUB_OUTPUT
            echo "host=freellmapi.ddns.net" >> $GITHUB_OUTPUT
          else
            echo "stack=soitgoes887/freellmapi-dev" >> $GITHUB_OUTPUT
            echo "namespace=freellmapi-dev" >> $GITHUB_OUTPUT
            echo "host=freellmapi-dev.167-235-219-49.sslip.io" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ env.DOCKER_IMAGE }}:${{ steps.version.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Pulumi
        uses: pulumi/actions@v5

      - name: Install infrastructure dependencies
        working-directory: infrastructure
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Setup kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy with Pulumi
        working-directory: infrastructure
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
        run: |
          pulumi stack select ${{ steps.env.outputs.stack }}

          # Clear any pending CREATE operations from interrupted runs.
          pulumi refresh --clear-pending-creates --yes

          # Drop orphan k8s resources that exist in the cluster but not in Pulumi
          # state (common after state drift or cancelled runs). Safe — Pulumi
          # will recreate them on the next up.
          kubectl delete deployment freellmapi -n ${{ steps.env.outputs.namespace }} --ignore-not-found
          kubectl delete service freellmapi -n ${{ steps.env.outputs.namespace }} --ignore-not-found
          kubectl delete ingress freellmapi -n ${{ steps.env.outputs.namespace }} --ignore-not-found

          # Reverse case: PVC missing from cluster but still referenced in Pulumi
          # state. Drop it from state so `up` recreates it. No-op when consistent.
          if ! kubectl -n ${{ steps.env.outputs.namespace }} get pvc freellmapi-data >/dev/null 2>&1; then
            PVC_URN=$(pulumi stack --show-urns 2>/dev/null | grep PersistentVolumeClaim | awk '{print $NF}' || true)
            if [ -n "$PVC_URN" ]; then
              echo "Removing stale PVC from Pulumi state: $PVC_URN"
              pulumi state delete "$PVC_URN" --yes --target-dependents || true
            fi
          fi

          pulumi config set image ${{ env.DOCKER_IMAGE }}:${{ steps.version.outputs.tag }}
          pulumi config set namespace ${{ steps.env.outputs.namespace }}
          pulumi config set host ${{ steps.env.outputs.host }}
          pulumi up --yes

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/freellmapi -n ${{ steps.env.outputs.namespace }} --timeout=180s

      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ steps.version.outputs.tag }}
          name: v${{ steps.version.outputs.tag }}
          body: |
            Automated release from commit ${{ github.sha }}

            **Environment:** ${{ steps.env.outputs.environment }}
            **Changes:** ${{ github.event.head_commit.message }}

            **Docker Image:** `${{ env.DOCKER_IMAGE }}:${{ steps.version.outputs.tag }}`
          generateReleaseNotes: true
          skipIfReleaseExists: true
